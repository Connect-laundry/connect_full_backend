databases:
  - name: connectlaundry-db
    plan: free
    databaseName: connectlaundry_db
    user: connect_admin

services:
  - type: redis
    name: connectlaundry-redis
    plan: free
    ipAllowList: [] # Only allow internal connections

  - type: web
    name: connect-laundry-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: connectlaundry-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: connectlaundry-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: connectlaundry-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_LOG_LEVEL
        value: INFO
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_CALLBACK_URL
        sync: false
      - key: PAYMENT_CURRENCY
        value: GHS
      - key: EXPO_PUSH_ENABLED
        value: "True"
      - key: WEATHER_PROMO_ENABLED
        value: "True"
      - key: WEATHER_PROMO_PROVIDER
        value: open-meteo
      - key: WEATHER_PROMO_LATITUDE
        value: "5.6037"
      - key: WEATHER_PROMO_LONGITUDE
        value: "-0.1870"
      - key: SENTRY_DSN
        sync: false
      - key: INTERNAL_HEALTH_TOKEN
        sync: false
      - key: CLERK_APPLICATION_ID
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_JWT_ISSUER
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_JWT_AUDIENCE
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false

  - type: worker
    name: connect-laundry-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    command: celery -A config worker --loglevel=info
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: connectlaundry-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: connectlaundry-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: connectlaundry-redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: connect-laundry-backend
          property: envVar:SECRET_KEY
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_CALLBACK_URL
        sync: false
      - key: PAYMENT_CURRENCY
        value: GHS
      - key: EXPO_PUSH_ENABLED
        value: "True"
      - key: SENTRY_DSN
        sync: false
      - key: CLERK_APPLICATION_ID
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_JWT_ISSUER
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_JWT_AUDIENCE
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false

  - type: worker
    name: connect-laundry-beat
    runtime: docker
    dockerfilePath: ./Dockerfile
    command: celery -A config beat --loglevel=info
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: connectlaundry-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: connectlaundry-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: connectlaundry-redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: connect-laundry-backend
          property: envVar:SECRET_KEY
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_CALLBACK_URL
        sync: false
      - key: PAYMENT_CURRENCY
        value: GHS
      - key: EXPO_PUSH_ENABLED
        value: "True"
      - key: WEATHER_PROMO_ENABLED
        value: "True"
      - key: WEATHER_PROMO_PROVIDER
        value: open-meteo
      - key: WEATHER_PROMO_LATITUDE
        value: "5.6037"
      - key: WEATHER_PROMO_LONGITUDE
        value: "-0.1870"
      - key: SENTRY_DSN
        sync: false
      - key: CLERK_APPLICATION_ID
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_JWT_ISSUER
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_JWT_AUDIENCE
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
