services:
  - type: web
    name: connect-laundry-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false # Set this in Render Dashboard for security
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PORT
        value: "10000"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: REDIS_URL
        sync: false
      - key: DJANGO_LOG_LEVEL
        value: INFO
      - key: CLOUDINARY_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CURRENCY
        value: "GHS"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false

  - type: worker
    name: connect-laundry-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: "celery -A config worker -l info"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromService:
          type: web
          name: connect-laundry-backend
          envVar: DATABASE_URL
      - key: REDIS_URL
        fromService:
          type: web
          name: connect-laundry-backend
          envVar: REDIS_URL
      - key: SECRET_KEY
        fromService:
          type: web
          name: connect-laundry-backend
          envVar: SECRET_KEY
      - key: SENTRY_DSN
        fromService:
          type: web
          name: connect-laundry-backend
          envVar: SENTRY_DSN
      - key: DEBUG
        value: "False"
