databases:
  - name: connectlaundry-db
    plan: free
    databaseName: connectlaundry_db
    user: connect_admin

services:
  - type: redis
    name: connectlaundry-redis
    plan: free
    ipAllowList: [] # Only allow internal connections

  - type: web
    name: connect-laundry-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: connectlaundry-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: connectlaundry-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: connectlaundry-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_LOG_LEVEL
        value: INFO

  - type: worker
    name: connect-laundry-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    command: celery -A config worker --loglevel=info
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: connectlaundry-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: connectlaundry-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: connectlaundry-redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: connect-laundry-backend
          property: envVar:SECRET_KEY
