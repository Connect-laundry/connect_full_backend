name: Connect Laundry Backend CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality-and-security:
    name: Code Quality, Security & Testing
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: connect_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_NAME: connect_test
      DB_USER: postgres
      DB_PASSWORD: password
      DB_HOST: localhost
      DB_PORT: 5432
      SECRET_KEY: ci-test-secret-key-must-be-long-and-secure-enough
      DEBUG: True
      DATABASE_SSL_REQUIRE: 'False'
      PORT: 8000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Safety Scan (pip-audit)
        run: pip-audit

      - name: Security Scan (Bandit)
        run: bandit -r . -x ./tests,./venv -ll

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The user wants strictness, 
          # so we remove --exit-zero for common stylistic errors if desired.
          # For now, we enforce a reasonably high standard.
          flake8 . --count --max-complexity=12 --max-line-length=120 --statistics

      - name: Production Safety Check
        run: python scripts/check_prod_settings.py

      - name: Run Unit Tests with Coverage
        run: |
          pytest --cov=. --cov-report=xml --cov-fail-under=30

      - name: Verify Migrations are in Sync
        run: |
          python manage.py makemigrations --check --dry-run || (echo "::error::Migrations out of sync!" && exit 1)

      - name: Prepare Database for Integration Tests
        run: |
          echo "Running migrations..."
          python manage.py migrate --noinput
          echo "Creating cache table..."
          python manage.py createcachetable
          echo "Database ready."

      - name: Start Background Server for API Validation
        run: |
          nohup python manage.py runserver 0.0.0.0:8000 > django_server.log 2>&1 &
          echo "Waiting for Django to start..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8000/api/v1/health/ > /dev/null; then
              echo "Server is UP!"
              break
            fi
            echo "Still waiting... ($i/30)"
            sleep 2
          done

      - name: Create Admin User for Integration Tests
        run: |
          echo "Creating test admin user..."
          python create_admin.py
          echo "Admin user ready."

      - name: Run Full API Validation Suite
        run: python scripts/full_validation_suite.py
        env:
          # Override base URL for CI environment if needed
          BASE_URL: "http://127.0.0.1:8000/api/v1"

      - name: Docker Smoke Test (Build & Start)
        run: |
          docker build -t connect-backend:latest .
          docker run -d --name smoke-test --network=host \
            -e SECRET_KEY=smoke-test-key \
            -e DEBUG=True \
            -e PORT=10001 \
            -e DB_NAME=connect_test \
            -e DB_USER=postgres \
            -e DB_PASSWORD=password \
            -e DB_HOST=localhost \
            -e DB_PORT=5432 \
            -e DATABASE_SSL_REQUIRE=False \
            connect-backend:latest
          
          # Wait for smoke test instance
          for i in {1..15}; do
            if curl -s http://localhost:10001/health/ > /dev/null; then
              echo "Docker image is healthy!"
              break
            fi
            sleep 5
            if [ $i -eq 15 ]; then
              docker logs smoke-test
              exit 1
            fi
          done
          docker stop smoke-test && docker rm smoke-test

  deploy:
    name: Safe Production Deployment
    needs: quality-and-security
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL secret is not set!"
            exit 1
          fi
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
