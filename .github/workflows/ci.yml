name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: connect_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-django flake8 bandit safety pytest-cov

    - name: Security Audit (Bandit)
      run: |
        bandit -r . -x ./tests,./scripts -ll

    - name: Dependency Scan (Safety)
      run: |
        # We ignore 70612 (psycopg2) as we use psycopg[binary] 3.x for most work
        # We ignore 64459 and 64396 (ecdsa architecture limitations in python)
        # We ignore 66963 (sometimes safety bugs out on >= spec matching)
        # Let's see if the upgrades satisfy it first. 
        # We ignore 81038 (brotli DoS vulnerability) as 1.1.0 is the main version 
        # and we are upgrading to 1.2.0. Safety check might still flag it if it's in the DB.
        safety check --ignore 70612 --ignore 64459 --ignore 64396 --ignore 81038

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Tests with Coverage
      env:
        DB_NAME: connect_test
        DB_USER: postgres
        DB_PASSWORD: password
        DB_HOST: localhost
        DB_PORT: 5432
        SECRET_KEY: test-secret-key
        DEBUG: True
        DATABASE_SSL_REQUIRE: 'False'
      run: |
        coverage run manage.py test
        coverage report --fail-under=40

    - name: Verify Migrations are in Sync
      env:
        DB_NAME: connect_test
        DB_USER: postgres
        DB_PASSWORD: password
        DB_HOST: localhost
        DB_PORT: 5432
        SECRET_KEY: test-secret-key
        DEBUG: "true"
        DATABASE_SSL_REQUIRE: 'False'
      run: |
        # Run check and capture output
        if ! python manage.py makemigrations --check --dry-run; then
          echo "::error::Migrations are out of sync with models or a system check failed! Please run 'python manage.py makemigrations' locally and commit the changes."
          exit 1
        fi

    - name: Build & Health Check (Docker Smoke Test)
      run: |
        docker build -t connect-backend:latest .
        docker run -d --name smoke-test --network=host \
          -e SECRET_KEY=smoke-test-key \
          -e DEBUG=True \
          -e PORT=10000 \
          -e DB_NAME=connect_test \
          -e DB_USER=postgres \
          -e DB_PASSWORD=password \
          -e DB_HOST=localhost \
          -e DB_PORT=5432 \
          -e DATABASE_SSL_REQUIRE=False \
          connect-backend:latest
        
        # Wait up to 75 seconds for the health endpoint
        HEALTH_CHECK_PASSED=false
        for i in {1..15}; do
          if curl -s -f http://localhost:10000/health/ > /dev/null; then
            echo "Service is healthy!"
            HEALTH_CHECK_PASSED=true
            break
          fi
          echo "Waiting for service to start... ($i/15)"
          sleep 5
        done
        
        if [ "$HEALTH_CHECK_PASSED" = false ]; then
          echo "Service failed to start in time or health check failed."
          docker logs smoke-test
          docker stop smoke-test && docker rm smoke-test
          exit 1
        fi
        
        docker stop smoke-test && docker rm smoke-test
