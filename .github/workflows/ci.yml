name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: connect_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-django flake8 bandit safety pytest-cov

    - name: Security Audit (Bandit)
      run: |
        bandit -r . -x ./tests,./scripts -ll

    - name: Dependency Scan (Safety)
      run: |
        # We ignore 70612 (psycopg2) as we use psycopg[binary] 3.x for most work
        safety check --ignore 70612

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Tests with Coverage
      env:
        DB_NAME: connect_test
        DB_USER: postgres
        DB_PASSWORD: password
        DB_HOST: localhost
        DB_PORT: 5432
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key
        DEBUG: True
        DATABASE_SSL_REQUIRE: 'False'
      run: |
        coverage run manage.py test
        coverage report --fail-under=40

    - name: Verify Migrations are in Sync
      env:
        DB_NAME: connect_test
        DB_USER: postgres
        DB_PASSWORD: password
        DB_HOST: localhost
        DB_PORT: 5432
        DATABASE_SSL_REQUIRE: 'False'
      run: |
        python manage.py makemigrations --check --dry-run || (echo "Migrations are out of sync with models! Please run makemigrations locally." && exit 1)

    - name: Build & Health Check (Docker Smoke Test)
      run: |
        docker build -t connect-backend:latest .
        docker run -d --name smoke-test -p 8000:8000 \
          -e SECRET_KEY=smoke-test-key \
          -e DEBUG=True \
          -e DATABASE_URL=sqlite:///:memory: \
          connect-backend:latest
        sleep 10
        curl -f http://localhost:8000/health/ || (docker logs smoke-test && exit 1)
        docker stop smoke-test && docker rm smoke-test
