name: Backend CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.test_settings

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Validate release readiness
        run: python scripts/release_readiness.py

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: v0.70.0
          cache: true

      - name: Secret scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          format: table
          exit-code: '1'
          skip-setup-trivy: true
          skip-dirs: .git,.pytest_cache,__pycache__,staticfiles,media

      - name: Dependency audit
        run: |
          # PYSEC-2025-183 is disputed upstream and has no fixed PyJWT version.
          # The reported risk is weak application-chosen HMAC keys; production
          # SECRET_KEY strength is enforced in config/settings.py.
          #
          # PYSEC-2026-1325 (ecdsa Minerva timing attack) is unfixed and disputed by python-ecdsa maintainers.
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2025-183 --ignore-vuln PYSEC-2026-1325

      - name: Install Semgrep
        run: pip install semgrep

      - name: Static security scan
        run: semgrep --error --config=p/python --config=p/django config laundries logistics marketplace ordering payments users

      - name: Security lint
        run: python -m bandit -q -r config laundries logistics ordering payments users --severity-level medium

      - name: Django checks
        run: |
          python manage.py check --settings=config.test_settings
          python manage.py check --deploy --settings=config.test_settings
          python manage.py makemigrations --check --dry-run --settings=config.test_settings

      - name: Run pytest
        run: pytest
