name: Backend CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.test_settings

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit semgrep

      - name: Validate release readiness
        run: python scripts/release_readiness.py

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Static security scan
        run: semgrep --error --config=p/python --config=p/django config laundries logistics marketplace ordering payments users

      - name: Dependency audit
        run: pip-audit

      - name: Security lint
        run: bandit -q -r config laundries logistics ordering payments users

      - name: Django checks
        run: |
          python manage.py check --settings=config.test_settings
          python manage.py check --deploy --settings=config.test_settings
          python manage.py makemigrations --check --dry-run --settings=config.test_settings

      - name: Run pytest
        run: pytest
