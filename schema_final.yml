      operationId: api_v1_booking_items_retrieve
      description: |-
        Viewset for global catalog of items and services.
        Strictly filters for active items from approved/active laundries.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LaunderableItem'
          description: ''
  /api/v1/booking/lifecycle/{id}/accept/:
    patch:
      operationId: api_v1_booking_lifecycle_accept_partial_update
      description: PENDING -> CONFIRMED (Laundry Only)
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this order.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedOrderTransitionRequest'
