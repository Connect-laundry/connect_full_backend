components:
  schemas:
    Address:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        label:
          type: string
          description: Home, Work, etc.
          maxLength: 50
        address_line1:
          type: string
          title: Address line 1
          maxLength: 255
        city:
          type: string
          maxLength: 100
        latitude:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          nullable: true
        longitude:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          nullable: true
        is_default:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - address_line1
      - created_at
      - id
      - label
    AddressRequest:
      type: object
      properties:
        label:
          type: string
          minLength: 1
          description: Home, Work, etc.
          maxLength: 50
        address_line1:
          type: string
          minLength: 1
          title: Address line 1
          maxLength: 255
        city:
          type: string
          minLength: 1
          maxLength: 100
        latitude:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          nullable: true
        longitude:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          nullable: true
        is_default:
          type: boolean
      required:
      - address_line1
      - label
    AdminLaundryApproval:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/AdminLaundryApprovalStatusEnum'
          title: Approval status
        is_active:
          type: boolean
        approved_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        rejected_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - approved_at
      - id
      - name
      - rejected_at
    AdminLaundryApprovalStatusEnum:
      enum:
      - PENDING
      - APPROVED
      - REJECTED
      - SUSPENDED
      type: string
      description: |-
        * `PENDING` - Pending
        * `APPROVED` - Approved
        * `REJECTED` - Rejected
        * `SUSPENDED` - Suspended
    AssignmentTypeEnum:
      enum:
      - PICKUP
      - DELIVERY
      type: string
      description: |-
        * `PICKUP` - Pickup
        * `DELIVERY` - Delivery
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
      required:
      - id
      - name
    Coupon:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        code:
          type: string
          maxLength: 50
        discount_type:
          $ref: '#/components/schemas/DiscountTypeEnum'
        discount_value:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        min_order_value:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        valid_from:
          type: string
          format: date-time
        valid_to:
          type: string
          format: date-time
          nullable: true
        max_usage:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
          description: Total times this coupon can be used.
        current_usage:
          type: integer
          maximum: 2147483647
          minimum: 0
        user_limit:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Times a single user can use this coupon.
        is_active:
          type: boolean
      required:
      - code
      - discount_value
      - id
    CouponRequest:
      type: object
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 50
        discount_type:
          $ref: '#/components/schemas/DiscountTypeEnum'
        discount_value:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        min_order_value:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        valid_from:
          type: string
          format: date-time
        valid_to:
          type: string
          format: date-time
          nullable: true
        max_usage:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
          description: Total times this coupon can be used.
        current_usage:
          type: integer
          maximum: 2147483647
          minimum: 0
        user_limit:
          type: integer
          maximum: 2147483647
