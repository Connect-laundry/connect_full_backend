<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Connect Laundry</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #f97316; /* Connect Laundry Orange */
            --secondary-color: #64748b;
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Spheres */
        .sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        .sphere-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--primary-color), transparent);
            top: -100px;
            left: -100px;
        }

        .sphere-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #3b82f6, transparent);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 100px) scale(1.2); }
        }

        .container {
            text-align: center;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 8rem;
            font-weight: 600;
            line-height: 1;
            background: linear-gradient(to bottom right, #fff, var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--text-color);
            margin-bottom: 1.5rem;
        }

        p {
            color: var(--secondary-color);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 0.8rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(249, 115, 22, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(249, 115, 22, 0.4);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(0);
        }

        .logo {
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 2rem;
            display: block;
            font-size: 1.25rem;
        }
    </style>
</head>
<body>
    <div class="sphere sphere-1"></div>
    <div class="sphere sphere-2"></div>

    <div class="container">
        <span class="logo">Connect Laundry</span>
        <h1>404</h1>
        <h2>Lost in the Suds?</h2>
        <p>The page you are looking for has been moved or doesn't exist. Let's get you back on track to clean clothes.</p>
        <a href="/" class="btn">Return to Dashboard</a>
    </div>
</body>
</html>
