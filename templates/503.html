<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="15">
  <title>Temporarily unavailable — Connect Laundry</title>
  <style>
    :root { --primary: #9333ea; --ink: #1f2937; --muted: #6b7280; --bg: #f9fafb; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--bg); color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 24px;
    }
    .card {
      background: #fff; border: 1px solid #eee; border-radius: 16px; max-width: 460px; width: 100%;
      padding: 40px 32px; text-align: center; box-shadow: 0 10px 30px rgba(17, 24, 39, 0.06);
    }
    .badge {
      width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 20px;
      background: rgba(147, 51, 234, 0.1); display: flex; align-items: center; justify-content: center;
    }
    .badge svg { width: 32px; height: 32px; stroke: var(--primary); }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { color: var(--muted); font-size: 15px; line-height: 1.55; margin: 0 0 8px; }
    .hint { font-size: 13px; margin-top: 18px; }
    .rid { margin-top: 20px; font-size: 11px; color: #9ca3af; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    a.btn {
      display: inline-block; margin-top: 22px; padding: 11px 22px; border-radius: 10px;
      background: var(--primary); color: #fff; text-decoration: none; font-size: 14px; font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 9v4m0 4h.01M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
      </svg>
    </div>
    <h1>Temporarily unavailable</h1>
    <p>We can't reach the database right now. This is usually brief — please try again in a few moments.</p>
    <p class="hint">This page refreshes automatically.</p>
    <a class="btn" href="">Retry now</a>
    {% if request_id %}<div class="rid">Reference: {{ request_id }}</div>{% endif %}
  </div>
</body>
</html>
