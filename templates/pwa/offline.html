{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | Connect Laundry Admin</title>
    <link href="{% static 'unfold/fonts/inter/styles.css' %}" rel="stylesheet">
    <link href="{% static 'unfold/fonts/material-symbols/styles.css' %}" rel="stylesheet">
    <style>
        :root {
            --primary: #9333ea;
            --primary-hover: #7e22ce;
            --bg-light: #f9fafb;
            --text-light: #111827;
            --card-light: #ffffff;
            --border-light: #e5e7eb;
            --muted-light: #6b7280;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background-color: var(--card-light);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            width: 100%;
            max-width: 440px;
            padding: 40px 32px;
            text-align: center;
        }
        .icon-container {
            background-color: #f5f3ff;
            color: var(--primary);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .icon-container span {
            font-size: 44px;
        }
        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }
        p {
            font-size: 14px;
            color: var(--muted-light);
            line-height: 1.5;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.15s ease;
        }
        .btn:hover {
            background-color: var(--primary-hover);
        }
        .btn span {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-container">
            <span class="material-symbols-outlined">wifi_off</span>
        </div>
        <h1>You are offline</h1>
        <p>Connect Laundry Admin requires an active internet connection. Please check your network cables or Wi-Fi status and try again.</p>
        <button class="btn" onclick="retryConnection()">
            <span class="material-symbols-outlined">refresh</span>
            Try Again
        </button>
    </div>

    <script>
        function retryConnection() {
            const btn = document.querySelector('.btn');
            btn.innerHTML = '<span class="material-symbols-outlined" style="animation: spin 1s linear infinite">sync</span> Checking...';
            btn.disabled = true;
            
            // Brief timeout to show checking feedback, then reload
            setTimeout(() => {
                window.location.reload();
            }, 800);
        }
    </script>
    <style>
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
