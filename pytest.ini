[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py test_*.py *_tests.py
addopts = --reuse-db --ignore=tests/integration --ignore=venv --ignore=.venv
norecursedirs = venv .venv .git __pycache__ migrations tests/integration
# Only collect from files that specifically match python_files, do not scan everything.
testpaths = tests laundries marketplace ordering payments users
